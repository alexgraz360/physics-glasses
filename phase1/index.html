<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#06080f">
<title>Reality Engine · Physics — Experiments</title>
<style>
  :root {
    --bg: #06080f;
    --panel: rgba(10, 14, 24, 0.72);
    --panel-solid: #0c1220;
    --line: rgba(120, 160, 255, 0.18);
    --text: #e8eefc;
    --dim: #8899bb;
    --accent: #4da3ff;
    --sensor: #b48cff;
    --good: #3ddc84;
    --warn: #ffb347;
    --bad: #ff5c6c;
    --mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body { overflow: hidden; }
  button { font-family: inherit; }

  /* ================= hub ================= */
  #hub { position: fixed; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch;
    background: radial-gradient(120% 70% at 50% 0%, #0d1526 0%, var(--bg) 60%);
    padding: calc(env(safe-area-inset-top, 0px) + 26px) 18px calc(env(safe-area-inset-bottom, 0px) + 26px); }
  #hub header { max-width: 560px; margin: 0 auto 20px; }
  #hub h1 { font-size: 24px; font-weight: 700; }
  #hub h1 span { color: var(--accent); }
  #hub .sub { color: var(--dim); font-size: 13px; margin-top: 4px; line-height: 1.5; }
  #cards { max-width: 560px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .card { position: relative; text-align: left; border: 1px solid var(--line); border-radius: 16px;
    background: var(--panel); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 14px; cursor: pointer; color: var(--text); display: flex; flex-direction: column; gap: 8px;
    min-height: 118px; transition: transform 0.1s; }
  .card:active { transform: scale(0.98); }
  .card .icon { font-size: 26px; line-height: 1; }
  .card .name { font-weight: 700; font-size: 15px; }
  .card .blurb { color: var(--dim); font-size: 11.5px; line-height: 1.45; }
  .tag { position: absolute; top: 12px; right: 12px; font-family: var(--mono); font-size: 9px;
    font-weight: 700; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 999px; }
  .tag.camera { color: var(--accent); border: 1px solid rgba(77, 163, 255, 0.45); }
  .tag.sensor { color: var(--sensor); border: 1px solid rgba(180, 140, 255, 0.45); }
  .card.soon { opacity: 0.45; cursor: default; }
  .card.soon .soonNote { font-family: var(--mono); font-size: 9.5px; letter-spacing: 0.1em;
    color: var(--warn); margin-top: auto; }
  .card:not(.soon) .go { margin-top: auto; font-size: 11.5px; color: var(--accent); font-weight: 600; }
  #hub footer { max-width: 560px; margin: 22px auto 0; color: var(--dim); font-size: 11px;
    line-height: 1.6; text-align: center; }
  #hub footer a { color: var(--dim); }

  /* ================= experiment shell ================= */
  #expView { position: fixed; inset: 0; display: none; flex-direction: column; background: var(--bg); }
  #expView.open { display: flex; }
  #expBar { display: flex; align-items: center; gap: 10px; z-index: 30;
    padding: calc(env(safe-area-inset-top, 0px) + 8px) 12px 8px;
    background: var(--panel); border-bottom: 1px solid var(--line);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  #backBtn { appearance: none; border: 1px solid var(--line); background: transparent; color: var(--text);
    border-radius: 999px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer;
    flex-shrink: 0; }
  #expTitle { font-weight: 700; font-size: 15px; flex: 1; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; }
  #expTag { font-family: var(--mono); font-size: 9px; font-weight: 700; letter-spacing: 0.1em;
    padding: 3px 8px; border-radius: 999px; flex-shrink: 0; }
  #expRoot { flex: 1; position: relative; overflow: hidden; }

  /* ============ shared experiment widgets (used by modules) ============ */
  .pillRow { position: absolute; top: 10px; left: 12px; display: flex; gap: 8px; z-index: 20; }
  .pill { display: flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px;
    background: var(--panel); border: 1px solid var(--line); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px); font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
    font-family: var(--mono); color: var(--dim); }
  .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: #556; }
  .pill.wait .dot { background: var(--warn); animation: pulse 1.1s infinite; }
  .pill.ok .dot   { background: var(--good); }
  .pill.err .dot  { background: var(--bad); }
  .pill.ok  { color: var(--text); }
  .pill.err { color: var(--bad); }
  @keyframes pulse { 50% { opacity: 0.35; } }

  .readout { position: absolute; left: 12px; right: 12px;
    bottom: calc(env(safe-area-inset-bottom, 0px) + 12px); z-index: 20;
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); padding: 12px 14px 10px; }
  .statRow { display: flex; justify-content: space-between; gap: 6px; }
  .stat { flex: 1; text-align: center; min-width: 0; }
  .stat .v { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums; white-space: nowrap; }
  .stat .v.big { font-size: 24px; color: var(--good); }
  .stat .l { font-size: 9.5px; letter-spacing: 0.1em; color: var(--dim); margin-top: 2px;
    text-transform: uppercase; white-space: nowrap; }
  .noteLine { margin-top: 8px; padding-top: 7px; border-top: 1px solid var(--line);
    font-size: 10.5px; color: var(--dim); text-align: center; }

  .hintLine { position: absolute; left: 0; right: 0; text-align: center; z-index: 19;
    font-size: 13px; color: var(--text); text-shadow: 0 1px 6px rgba(0,0,0,0.8);
    padding: 0 24px; pointer-events: none; transition: opacity 0.3s; }
  .hintLine.hidden { opacity: 0; }

  .bigBtn { appearance: none; border: 0; border-radius: 999px; padding: 14px 40px;
    font-size: 16px; font-weight: 700; color: #04121f; background: var(--accent);
    box-shadow: 0 0 30px rgba(77, 163, 255, 0.4); cursor: pointer; }
  .bigBtn:disabled { opacity: 0.5; }
  .bigBtn:active { transform: scale(0.97); }
  .ghostBtn { appearance: none; border: 1px solid var(--line); background: var(--panel);
    color: var(--text); border-radius: 999px; padding: 8px 16px; font-size: 12.5px;
    font-weight: 600; cursor: pointer; backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
  .ghostBtn.accent { border-color: rgba(77, 163, 255, 0.5); color: var(--accent); }

  .gatePanel { position: absolute; inset: 0; z-index: 25; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 28px;
    background: radial-gradient(120% 90% at 50% 0%, #0d1526 0%, var(--bg) 70%); }
  .gatePanel p { color: var(--dim); font-size: 13.5px; line-height: 1.55; max-width: 340px; }
  .gatePanel .err { color: var(--bad); display: none; }

  input[type="number"] { appearance: none; -webkit-appearance: none; border: 1px solid var(--line);
    background: var(--panel-solid); color: var(--text); border-radius: 10px; padding: 8px 10px;
    font-size: 15px; font-family: var(--mono); width: 90px; text-align: center; }
  input[type="number"]:focus { outline: none; border-color: var(--accent); }
</style>
</head>
<body>
  <div id="hub">
    <header>
      <h1>Reality Engine · <span>Physics</span></h1>
      <div class="sub">Experiments — measure the real world with the phone's sensors and camera.</div>
    </header>
    <div id="cards"></div>
    <footer>
      Phase 1 · <a href="../phase0/">Phase 0 spike</a> · sensor experiments give real units directly;
      camera experiments need a one-time length calibration.
    </footer>
  </div>

  <div id="expView">
    <div id="expBar">
      <button id="backBtn">← Experiments</button>
      <div id="expTitle"></div>
      <div id="expTag"></div>
    </div>
    <div id="expRoot"></div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
